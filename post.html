<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal — Anna Voss</title>
  <meta name="description" content="" id="meta-desc" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a; --white: #f5f4f0; --gray: #9a9a9a; --light-gray: #e8e7e3;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--white); color: var(--black); font-family: var(--font-body); font-size: 14px; line-height: 1.7; cursor: crosshair; }
    .cursor { width: 8px; height: 8px; background: var(--black); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: width .2s,height .2s; }
    .cursor.expanded { width: 40px; height: 40px; background: transparent; border: 1px solid var(--black); }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: flex-end; padding: 28px 40px 20px; background: var(--white); border-bottom: 1px solid var(--black); }
    .nav-logo { font-family: var(--font-display); font-size: 26px; letter-spacing: 0.08em; text-decoration: none; color: var(--black); line-height: 1; }
    .nav-back { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; text-decoration: none; color: var(--gray); transition: color .2s; }
    .nav-back:hover { color: var(--black); }
    .nav-back::before { content: '← '; }

    /* POST HEADER */
    .post-header { margin-top: 73px; display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--black); min-height: 60vh; }
    .post-header-left { padding: 60px 50px; display: flex; flex-direction: column; justify-content: space-between; border-right: 1px solid var(--black); }
    .post-meta-top { display: flex; gap: 20px; align-items: center; margin-bottom: 32px; }
    .post-category { font-size: 9px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--gray); }
    .post-status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--black); display: inline-block; }
    .post-date-label { font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gray); }
    .post-title { font-family: var(--font-display); font-size: clamp(40px, 5vw, 72px); line-height: 0.95; letter-spacing: 0.03em; margin-bottom: 32px; }
    .post-excerpt { font-size: 14px; line-height: 1.75; color: #4a4a4a; max-width: 480px; }
    .post-meta-bottom { border-top: 1px solid var(--black); padding-top: 24px; display: flex; gap: 40px; }
    .post-meta-bottom dt { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray); margin-bottom: 4px; }
    .post-meta-bottom dd { font-size: 12px; }
    .post-header-right { overflow: hidden; position: relative; }
    .post-header-right img { width: 100%; height: 100%; object-fit: cover; display: block; filter: grayscale(100%); }
    .post-header-right .no-image { width: 100%; height: 100%; background: var(--light-gray); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 80px; color: #ddd; min-height: 400px; }

    /* TAGS */
    .post-tags { padding: 20px 50px; border-bottom: 1px solid var(--black); display: flex; gap: 10px; align-items: center; }
    .post-tags-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray); margin-right: 6px; }
    .tag { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; border: 1px solid var(--light-gray); padding: 4px 12px; color: var(--gray); }

    /* BODY */
    .post-body { display: grid; grid-template-columns: 1fr 2fr; border-bottom: 1px solid var(--black); }
    .post-sidebar { border-right: 1px solid var(--black); padding: 60px 40px; }
    .sidebar-section { margin-bottom: 40px; }
    .sidebar-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray); margin-bottom: 12px; display: block; }
    .sidebar-value { font-size: 13px; line-height: 1.5; }
    .post-content { padding: 60px 60px 80px; max-width: 760px; }
    .post-content p { margin-bottom: 24px; font-size: 15px; line-height: 1.85; color: #2a2a2a; }
    .post-content h2 { font-family: var(--font-display); font-size: 32px; letter-spacing: 0.05em; margin: 40px 0 16px; }
    .post-content h3 { font-family: var(--font-display); font-size: 22px; letter-spacing: 0.05em; margin: 32px 0 12px; }
    .post-content blockquote { border-left: 3px solid var(--black); margin: 32px 0; padding: 12px 0 12px 24px; font-size: 16px; line-height: 1.7; color: #4a4a4a; font-style: italic; }
    .post-content img { width: 100%; display: block; filter: grayscale(100%); margin: 32px 0; }
    .post-content a { color: var(--black); border-bottom: 1px solid var(--light-gray); text-decoration: none; transition: border-color .2s; }
    .post-content a:hover { border-color: var(--black); }

    /* SEO */
    .post-seo { padding: 28px 50px; border-bottom: 1px solid var(--black); background: #f0efeb; display: flex; gap: 40px; }
    .seo-item label { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gray); display: block; margin-bottom: 4px; }
    .seo-item span { font-size: 11px; color: #5a5a5a; font-family: monospace; }

    /* NAV POSTS */
    .post-nav { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--black); }
    .post-nav-item { padding: 32px 40px; text-decoration: none; color: var(--black); transition: background .15s; display: block; }
    .post-nav-item:first-child { border-right: 1px solid var(--black); }
    .post-nav-item:hover { background: var(--light-gray); }
    .post-nav-dir { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray); margin-bottom: 8px; }
    .post-nav-title { font-family: var(--font-display); font-size: 20px; letter-spacing: 0.04em; }

    /* FOOTER */
    footer { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; }
    .footer-logo { font-family: var(--font-display); font-size: 18px; letter-spacing: 0.08em; }
    .footer-copy { font-size: 10px; color: var(--gray); letter-spacing: 0.1em; }
    .footer-links { display: flex; gap: 24px; list-style: none; }
    .footer-links a { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gray); text-decoration: none; }
    .footer-links a:hover { color: var(--black); }

    /* Error */
    .post-error { margin-top: 73px; padding: 120px 50px; text-align: center; }
    .post-error h1 { font-family: var(--font-display); font-size: 60px; letter-spacing: 0.06em; margin-bottom: 16px; }
    .post-error p { color: var(--gray); margin-bottom: 32px; }
    .post-error a { color: var(--black); letter-spacing: 0.12em; text-transform: uppercase; font-size: 11px; }

    @media (max-width: 900px) {
      nav { padding: 20px; }
      .post-header { grid-template-columns: 1fr; }
      .post-header-left { padding: 40px 20px; border-right: none; border-bottom: 1px solid var(--black); }
      .post-header-right { height: 50vw; }
      .post-body { grid-template-columns: 1fr; }
      .post-sidebar { border-right: none; border-bottom: 1px solid var(--black); padding: 32px 20px; }
      .post-content { padding: 40px 20px 60px; }
      .post-tags { padding: 16px 20px; }
      .post-seo { flex-direction: column; gap: 16px; padding: 20px; }
      .post-nav { grid-template-columns: 1fr; }
      .post-nav-item:first-child { border-right: none; border-bottom: 1px solid var(--black); }
      footer { flex-wrap: wrap; gap: 12px; padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>

  <nav>
    <a href="index.html" class="nav-logo">ANNA VOSS</a>
    <a href="index.html#blog" class="nav-back">Journal</a>
  </nav>

  <div id="post-container"></div>

  <footer>
    <span class="footer-logo">ANNA VOSS</span>
    <span class="footer-copy">© 2025 Anna Voss. All rights reserved.</span>
    <ul class="footer-links">
      <li><a href="#">Instagram</a></li><li><a href="#">Prints</a></li><li><a href="#">Press</a></li>
    </ul>
  </footer>

  <script>
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e=>{ cursor.style.left=e.clientX+'px'; cursor.style.top=e.clientY+'px'; });
    document.querySelectorAll('a').forEach(el=>{ el.addEventListener('mouseenter',()=>cursor.classList.add('expanded')); el.addEventListener('mouseleave',()=>cursor.classList.remove('expanded')); });

    function fmtDate(d){ if(!d)return''; return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}); }
    function fmtDateShort(d){ if(!d)return''; return new Date(d).toLocaleDateString('en-GB',{month:'long',year:'numeric'}); }

    async function loadPost(){
      const container = document.getElementById('post-container');
      const slug = new URLSearchParams(window.location.search).get('slug');
      if(!slug){ showError(container); return; }

      try {
        const res = await fetch('content/journal.json?t='+Date.now());
        const data = await res.json();
        const posts = data.posts||[];
        const idx = posts.findIndex(p=>p.slug===slug&&p.status==='published');
        if(idx===-1){ showError(container); return; }
        const post = posts[idx];

        // Update page meta
        document.title = post.title + ' — Anna Voss';
        if(post.metaDescription) document.getElementById('meta-desc').setAttribute('content', post.metaDescription);

        const prev = posts.slice(0,idx).filter(p=>p.status==='published').slice(-1)[0];
        const next = posts.slice(idx+1).filter(p=>p.status==='published')[0];

        const tags = (post.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
        const imgHtml = post.featuredImage
          ? `<img src="${post.featuredImage}" alt="${post.title}" />`
          : `<div class="no-image">AV</div>`;

        container.innerHTML = `
          <div class="post-header">
            <div class="post-header-left">
              <div>
                <div class="post-meta-top">
                  <span class="post-category">${post.category||'Journal'}</span>
                  <span class="post-status-dot"></span>
                  <span class="post-date-label">${fmtDate(post.date)}</span>
                </div>
                <h1 class="post-title">${post.title}</h1>
                ${post.excerpt ? `<p class="post-excerpt">${post.excerpt}</p>` : ''}
              </div>
              <dl class="post-meta-bottom">
                <div><dt>Category</dt><dd>${post.category||'—'}</dd></div>
                <div><dt>Published</dt><dd>${fmtDateShort(post.date)}</dd></div>
                ${post.readTime ? `<div><dt>Read time</dt><dd>${post.readTime} min</dd></div>` : ''}
              </dl>
            </div>
            <div class="post-header-right">${imgHtml}</div>
          </div>

          ${tags ? `<div class="post-tags"><span class="post-tags-label">Tags</span>${tags}</div>` : ''}

          <div class="post-body">
            <div class="post-sidebar">
              <div class="sidebar-section">
                <span class="sidebar-label">Published</span>
                <div class="sidebar-value">${fmtDate(post.date)}</div>
              </div>
              <div class="sidebar-section">
                <span class="sidebar-label">Category</span>
                <div class="sidebar-value">${post.category||'—'}</div>
              </div>
              ${(post.tags||[]).length ? `
              <div class="sidebar-section">
                <span class="sidebar-label">Tags</span>
                <div class="sidebar-value">${(post.tags||[]).join(', ')}</div>
              </div>` : ''}
            </div>
            <div class="post-content">${post.body||'<p>No content.</p>'}</div>
          </div>

          ${(post.metaDescription||post.slug) ? `
          <div class="post-seo">
            ${post.slug ? `<div class="seo-item"><label>Slug</label><span>${post.slug}</span></div>` : ''}
            ${post.metaDescription ? `<div class="seo-item"><label>Meta description</label><span>${post.metaDescription}</span></div>` : ''}
          </div>` : ''}

          <div class="post-nav">
            ${prev ? `<a class="post-nav-item" href="post.html?slug=${prev.slug}"><div class="post-nav-dir">← Previous</div><div class="post-nav-title">${prev.title}</div></a>` : '<div></div>'}
            ${next ? `<a class="post-nav-item" href="post.html?slug=${next.slug}" style="text-align:right"><div class="post-nav-dir">Next →</div><div class="post-nav-title">${next.title}</div></a>` : '<div></div>'}
          </div>`;

        document.querySelectorAll('a').forEach(el=>{ el.addEventListener('mouseenter',()=>cursor.classList.add('expanded')); el.addEventListener('mouseleave',()=>cursor.classList.remove('expanded')); });

      } catch(e){ showError(container); }
    }

    function showError(container){
      container.innerHTML = `<div class="post-error"><h1>NOT FOUND</h1><p>This post doesn't exist or hasn't been published.</p><a href="index.html#blog">← Back to Journal</a></div>`;
    }

    loadPost();
  </script>
</body>
</html>
